name: Build Vivify Quest

on:
  push:
    branches:
      - main
      - bugfix/**
      - feature/**
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget unzip git

      - name: Install QPM
        run: |
          curl -fsSL https://qpm.quest/install.sh | bash

          echo "Searching for qpm..."
          find $HOME -type f -name "qpm" 2>/dev/null || true

          QPM_PATH=$(find $HOME -type f -name "qpm" 2>/dev/null | head -n 1)

          if [ -z "$QPM_PATH" ]; then
            echo "QPM was not installed"
            exit 1
          fi

          echo "Found QPM at: $QPM_PATH"

          chmod +x "$QPM_PATH"

          QPM_DIR=$(dirname "$QPM_PATH")

          echo "$QPM_DIR" >> $GITHUB_PATH

      - name: Verify environment
        run: |
          which qpm || true
          qpm --version || true
          pwd
          ls -la

      - name: Restore packages
        run: |
          if [ -f qpm.json ]; then
            qpm restore
          else
            echo "No qpm.json found"
          fi

      - name: Build
        run: |
          if [ -f build.sh ]; then
            chmod +x build.sh
            ./build.sh
          else
            echo "No build.sh found"
            exit 1
          fi
