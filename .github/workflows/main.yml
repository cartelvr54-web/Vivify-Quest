name: Build Vivify QMOD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - 'bugfix/**'
      - 'feature/**'
  pull_request:
    branches:
      - main
      - 'bugfix/**'
      - 'feature/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget unzip git cmake ninja-build ccache openjdk-11-jdk

      - name: Setup Android NDK
        run: |
          set -euo pipefail
          mkdir -p /opt/android-ndk
          cd /opt/android-ndk
          echo "Downloading NDK..."
          curl -fSL -o android-ndk-r27c-linux.zip "https://dl.google.com/android/repository/android-ndk-r27c-linux.zip"
          unzip -q android-ndk-r27c-linux.zip
          rm -f android-ndk-r27c-linux.zip
          echo "ANDROID_NDK_HOME=/opt/android-ndk/android-ndk-r27c" >> $GITHUB_ENV

      - name: Install QPM (with fallback)
        run: |
          set -euo pipefail
          mkdir -p /opt/qpm
          cd /opt/qpm
          PRIMARY="https://github.com/QuestPackageManager/qpm-cli/releases/download/v0.16.5/qpm-linux"
          FALLBACK_ZIP="https://github.com/QuestPackageManager/QPM.CLI/releases/download/bleeding/qpm-linux-x64-musl.zip"

          echo "Trying primary QPM binary..."
          if curl -fSL -o qpm.bin "$PRIMARY"; then
            chmod +x qpm.bin
            sudo mv qpm.bin /usr/local/bin/qpm
          else
            echo "Primary binary not available; trying fallback zip..."
            curl -fSL -o qpm.zip "$FALLBACK_ZIP"
            unzip -q qpm.zip
            rm -f qpm.zip
            found=$(find . -type f -name qpm -print -quit || true)
            if [ -n "$found" ]; then
              chmod +x "$found"
              sudo mv "$found" /usr/local/bin/qpm
            else
              echo "Failed to locate qpm in fallback archive"
              ls -la
              exit 2
            fi
          fi
          qpm --version || true

      - name: Debug QPM state
        run: |
          echo "qpm version:"
          qpm --version || true
          echo "workspace root listing:"
          ls -la

      - name: QPM restore (temporary unlocked resolve)
        env:
          QPM_ALLOW_UNLOCKED_RESOLVE: "true"
        run: qpm restore

      - name: Build project
        env:
          ANDROID_NDK_HOME: /opt/android-ndk/android-ndk-r27c
          QPM_ALLOW_UNLOCKED_RESOLVE: "true"
        run: qpm s build

      - name: Create QMOD (debug, capture logs)
        env:
          ANDROID_NDK_HOME: /opt/android-ndk/android-ndk-r27c
          QPM_ALLOW_UNLOCKED_RESOLVE: "true"
        run: |
          set -euo pipefail
          echo "=== Running qpm s qmod (capture stdout/stderr) ==="
          qpm s qmod > qpm_qmod.log 2>&1 || true
          echo "=== qpm s qmod exit code ==="
          echo $? > qpm_qmod_exitcode.txt

          echo "=== Find any Vivify.qmod files ==="
          find "$GITHUB_WORKSPACE" -type f -name "Vivify.qmod" -print > qmod_find.log || true

          echo "=== Workspace root listing (top level) ==="
          ls -la "$GITHUB_WORKSPACE" > workspace_root.log || true

          echo "=== Build directory listing (shallow) ==="
          ls -la build > build_listing.log || true

          echo "=== extern directory listing (shallow) ==="
          ls -la extern > extern_listing.log || true

          echo "=== Tail of qpm log (if created) ==="
          tail -n +1 qpm_qmod.log | sed -n '1,200p' > qpm_qmod_tail.log || true

          # if a Vivify.qmod was found, copy first one to workspace root for upload
          found=$(awk 'NF{print; exit}' qmod_find.log || true)
          if [ -n "$found" ]; then
            echo "Found qmod at: $found"
            cp "$found" "$GITHUB_WORKSPACE/Vivify.qmod"
            ls -lah "$GITHUB_WORKSPACE/Vivify.qmod"
          else
            echo "No Vivify.qmod found (see qpm_qmod.log and qmod_find.log)"
          fi

      - name: Upload debug artifacts (qmod + logs)
        uses: actions/upload-artifact@v4
        with:
          name: Vivify-Debug
          path: |
            Vivify.qmod
            qpm_qmod.log
            qpm_qmod_exitcode.txt
            qpm_qmod_tail.log
            qmod_find.log
            workspace_root.log
            build_listing.log
            extern_listing.log
