name: Build Vivify QMOD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - 'bugfix/**'
      - 'feature/**'
  pull_request:
    branches:
      - main
      - 'bugfix/**'
      - 'feature/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget unzip git cmake ninja-build ccache openjdk-11-jdk

      - name: Setup NDK
        run: |
          mkdir -p /opt/android-ndk
          cd /opt/android-ndk
          wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q android-ndk-r27c-linux.zip
          echo "ANDROID_NDK_HOME=/opt/android-ndk/android-ndk-r27c" >> $GITHUB_ENV

      - name: Install QPM
        run: |
          mkdir -p /opt/qpm
          cd /opt/qpm
          wget -q https://github.com/QuestPackageManager/qpm-cli/releases/download/v0.16.5/qpm-linux -O qpm
          chmod +x qpm
          sudo mv qpm /usr/local/bin/qpm
          qpm --version || true

      - name: QPM Restore
        run: qpm restore

      - name: Build Project
        env:
          ANDROID_NDK_HOME: /opt/android-ndk/android-ndk-r27c
        run: qpm s build

      - name: Create QMOD
        env:
          ANDROID_NDK_HOME: /opt/android-ndk/android-ndk-r27c
        run: qpm s qmod

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vivify-QMOD
          path: Vivify.qmod
