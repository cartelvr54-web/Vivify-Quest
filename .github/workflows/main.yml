name: Build Vivify Quest

on:
  push:
    branches:
      - main
      - bugfix/**
      - feature/**
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget unzip git

      - name: Install QPM
        run: |
          mkdir -p $HOME/qpm
          cd $HOME/qpm

          wget https://github.com/QuestPackageManager/QPM.CLI/archive/refs/tags/v1.5.10.zip || exit 1

          chmod +x qpm-linux
          mv qpm-linux qpm

          echo "$HOME/qpm" >> $GITHUB_PATH

          export PATH="$HOME/qpm:$PATH"

          which qpm || true
          qpm --version || true

      - name: Verify environment
        run: |
          export PATH="$HOME/qpm:$PATH"

          which qpm || true
          qpm --version || true
          pwd
          ls -la

      - name: Restore packages
        run: |
          export PATH="$HOME/qpm:$PATH"

          if [ -f qpm.json ]; then
            qpm restore
          else
            echo "No qpm.json found"
          fi

      - name: Build
        run: |
          if [ -f build.sh ]; then
            chmod +x build.sh
            ./build.sh
          else
            echo "No build.sh found"
            exit 1
          fi
