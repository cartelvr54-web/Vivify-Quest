name: Build Vivify QMOD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - 'bugfix/**'
      - 'feature/**'
  pull_request:
    branches:
      - main
      - 'bugfix/**'
      - 'feature/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget unzip git cmake ninja-build ccache openjdk-11-jdk apt-transport-https software-properties-common

      - name: Setup Android NDK
        run: |
          set -euo pipefail
          mkdir -p /opt/android-ndk
          cd /opt/android-ndk
          echo "Downloading NDK..."
          curl -fSL -o android-ndk-r27c-linux.zip "https://dl.google.com/android/repository/android-ndk-r27c-linux.zip"
          unzip -q android-ndk-r27c-linux.zip
          rm -f android-ndk-r27c-linux.zip
          echo "ANDROID_NDK_HOME=/opt/android-ndk/android-ndk-r27c" >> $GITHUB_ENV

      - name: Install QPM (with fallback)
        run: |
          set -euo pipefail
          mkdir -p /opt/qpm
          cd /opt/qpm
          PRIMARY="https://github.com/QuestPackageManager/qpm-cli/releases/download/v0.16.5/qpm-linux"
          FALLBACK_ZIP="https://github.com/QuestPackageManager/QPM.CLI/releases/download/bleeding/qpm-linux-x64-musl.zip"
          echo "Trying primary QPM binary..."
          if curl -fSL -o qpm.bin "$PRIMARY"; then
            chmod +x qpm.bin
            sudo mv qpm.bin /usr/local/bin/qpm
          else
            echo "Primary binary not available; trying fallback zip..."
            curl -fSL -o qpm.zip "$FALLBACK_ZIP"
            unzip -q qpm.zip
            rm -f qpm.zip
            found=$(find . -type f -name qpm -print -quit || true)
            if [ -n "$found" ]; then
              chmod +x "$found"
              sudo mv "$found" /usr/local/bin/qpm
            else
              echo "Failed to locate qpm in fallback archive"
              ls -la
              exit 2
            fi
          fi
          qpm --version || true

      - name: Install PowerShell (pwsh) so build.ps1 can run
        run: |
          set -euo pipefail
          # Use Microsoft package feed for ubuntu-latest (Ubuntu 22.04/20.04)
          wget -q https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb -O packages-microsoft-prod.deb || true
          if [ -f packages-microsoft-prod.deb ]; then
            sudo dpkg -i packages-microsoft-prod.deb
            rm -f packages-microsoft-prod.deb
            sudo apt-get update
            sudo apt-get install -y powershell
          else
            # Fallback: try snap (may be slower)
            sudo snap install powershell --classic || true
          fi
          echo "pwsh version:"
          pwsh --version || true

      - name: QPM Restore
        run: qpm restore

      - name: Build project
        env:
          ANDROID_NDK_HOME: /opt/android-ndk/android-ndk-r27c
        run: qpm s build

      - name: Create QMOD
        env:
          ANDROID_NDK_HOME: /opt/android-ndk/android-ndk-r27c
        run: qpm s qmod

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vivify-QMOD
          path: '**/Vivify.qmod'
