name: Build Vivify Quest

on:
  push:
    branches:
      - main
      - bugfix/**
      - feature/**
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget curl git

      # Cache QPM packages to speed up builds
      - name: Cache QPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/qpm
            ~/.local/share/QPM
          key: qpm-${{ runner.os }}-${{ hashFiles('**/qpm.json','**/qpm.shared.json') }}
          restore-keys: |
            qpm-${{ runner.os }}-

      - name: Install QPM
        run: |
          mkdir -p /opt/qpm
          cd /opt/qpm

          wget -O qpm-linux \
            https://github.com/QuestPackageManager/QPM.CLI/releases/download/v1.5.10/qpm-linux

          chmod +x qpm-linux
          sudo ln -sf /opt/qpm/qpm-linux /usr/local/bin/qpm

          echo "Installed:"
          qpm --version

      - name: Verify environment
        run: |
          which qpm
          qpm --version
          pwd
          ls -la

      - name: Restore packages
        run: |
          if [ -f qpm.json ]; then
            qpm restore
          else
            echo "No qpm.json found, skipping"
          fi

      - name: Build
        run: |
          if [ -f build.sh ]; then
            chmod +x build.sh
            ./build.sh
          else
            echo "No build.sh found"
            exit 1
          fi

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Vivify-Quest-build
          path: |
            build/
            dist/
            artifacts/
          if-no-files-found: warn
