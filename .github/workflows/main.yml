jobs:
  steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Install dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y unzip wget curl git

  - name: Install QPM
    run: |
      curl -fsSL https://qpm.quest/install.sh | bash

      echo "$HOME/.local/bin" >> $GITHUB_PATH
      export PATH="$HOME/.local/bin:$PATH"

      which qpm
      qpm --version

  - name: Verify environment
    run: |
      export PATH="$HOME/.local/bin:$PATH"

      which qpm
      qpm --version
      pwd
      ls -la

  - name: Restore packages
    run: |
      export PATH="$HOME/.local/bin:$PATH"

      if [ -f qpm.json ]; then
        qpm restore
      else
        echo "No qpm.json found"
      fi

  - name: Build
    run: |
      if [ -f build.sh ]; then
        chmod +x build.sh
        ./build.sh
      else
        echo "No build.sh found"
        exit 1
      fi

  - name: Upload build artifacts
    uses: actions/upload-artifact@v4
    if: success()
    with:
      name: Vivify-Quest-build
      path: |
        build/
        dist/
        artifacts/
      if-no-files-found: warn
